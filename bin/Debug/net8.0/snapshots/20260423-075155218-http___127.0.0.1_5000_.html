    <script>
        var form = $("#signin");
        function submitForm() {
            let r = $("#username").val(),
                e = $("#password").val()
            if (r != "" && e != "")
                form.prop("action", "/Authorization/Login").submit()
        }

        $(document).ready(function () {
            $(document).on("click", "#icon-password", function () {
                let pass = $("#password").prop("type");
                if (pass == "password") {
                    $(this).html(`<i class="ki-outline ki-eye fs-2qx"></i>`);
                    $("#password").prop("type", "text");
                } else {
                    $(this).html(`<i class="ki-outline ki-eye-slash fs-2qx"></i>`);
                    $("#password").prop("type", "password")
                }
            });
            form.validate({
                rules: {
                    Username: "required",
                    Password: "required"
                },
                messages: {
                    Username: "Username or Email's required",
                    Password: "Password's required"
                },
                errorElement: "span",
                //errorClass: "invalid-feedback",
                errorPlacement: function (r, e) {
                    r.addClass("invalid-feedback");
                    e.parents(".position-relative").append(r)
                },
                highlight: function (r, e, s) {
                    //$(r).parents(".position-relative").addClass("has-error").removeClass("has-success")
                },
                unhighlight: function (r, e, s) {
                    //$(r).parents(".position-relative").addClass("has-success").removeClass("has-error")
                }
            });

            $("#btnSubmit").click(function () {
                form.valid() && submitForm()
            });
            $("#username, #password").keypress(function (r) {
                13 == r.which && form.valid() && submitForm()
            });

            $("#btn-forgot").click(function () {
                window.location.href = `/Authorization/ForgotPassword`;
            });

        });
